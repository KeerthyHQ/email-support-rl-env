<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Email Support Simulator</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: Arial;
        }

        .container {
            width: 450px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-top: 10px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            margin-right: 5px;
        }

        #history {
            margin-top: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            background: #fafafa;
        }
    </style>
</head>

<body>

<div class="container">

<h2>📩 Customer Email</h2>
<p id="email">Loading...</p>

<h3>📜 Conversation</h3>
<div id="history"></div>

<textarea id="reply" placeholder="Type your reply..."></textarea>

<br>

<button onclick="sendReply()">Send Reply</button>
<button onclick="reset()">🔄 Reset</button>

<h3>⭐ Reward: <span id="reward">0</span></h3>

</div>

<script>
   const BASE_URL = "";

// reset
async function reset() {
    const res = await fetch(BASE_URL + "/reset", { method: "POST" });
    const data = await res.json();

    document.getElementById("email").innerText = data.observation.email;
    document.getElementById("reward").innerText = data.reward;

    document.getElementById("history").innerHTML =
        `<p><b>📩 Customer:</b> ${data.observation.email}</p>`;
}

// send reply
async function sendReply() {
    const reply = document.getElementById("reply").value;

    if (!reply.trim()) return;

    const historyDiv = document.getElementById("history");

    historyDiv.innerHTML += `<p><b>🤖 You:</b> ${reply}</p>`;

    const res = await fetch(BASE_URL + "/step", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: { reply: reply }
        })
    });

    const data = await res.json();

    document.getElementById("email").innerText = data.observation.email;
    document.getElementById("reward").innerText = data.reward;

    historyDiv.innerHTML += `<p><b>📩 Customer:</b> ${data.observation.email}</p>`;

    historyDiv.scrollTop = historyDiv.scrollHeight;

    document.getElementById("reply").value = "";
}

// load first email
reset();

</script>

</body>
</html>
